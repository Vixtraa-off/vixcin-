<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VixCiné</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}


body{

    height:100vh;

    background:
    linear-gradient(
        rgba(0,0,0,.75),
        rgba(0,0,0,.95)
    ),
    radial-gradient(circle,#003b70,#000);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    overflow:hidden;

}


/* Effet lumière cinéma */

body:before{

    content:"";

    position:absolute;

    width:600px;
    height:600px;

    background:#008cff;

    filter:blur(180px);

    opacity:.25;

    animation:light 5s infinite alternate;

}


@keyframes light{

from{
    transform:translate(-200px,-100px);
}

to{
    transform:translate(200px,100px);
}

}



#home{

    text-align:center;
    z-index:2;

}



.logo{

    font-size:90px;

    font-weight:900;

    letter-spacing:10px;

    color:white;

    text-shadow:

    0 0 10px #00aaff,
    0 0 40px #008cff,
    0 0 80px #0066ff;

}



.subtitle{

    font-size:22px;

    margin-top:15px;

    color:#aaa;

}





.buttons{

    margin-top:80px;

    display:flex;

    gap:50px;

    justify-content:center;

}



.bigBtn{

    width:350px;

    height:140px;

    border-radius:25px;

    border:2px solid #008cff;


    background:

    linear-gradient(
        135deg,
        rgba(0,130,255,.35),
        rgba(0,0,0,.7)
    );


    color:white;

    font-size:30px;

    font-weight:bold;

    cursor:pointer;

    transition:.4s;


    box-shadow:

    0 0 30px #0077ff;

}



.bigBtn:hover{

    transform:scale(1.08);

    box-shadow:

    0 0 70px #00aaff;

}





#youtubeBox{

    display:none;

}



input{

    width:450px;

    padding:20px;

    border-radius:15px;

    border:none;

    font-size:18px;

    text-align:center;

    outline:none;

}



.start{

    margin-top:20px;

    width:250px;

    height:60px;

    border-radius:15px;

    border:none;

    background:#008cff;

    color:white;

    font-size:20px;

    cursor:pointer;

}




#back{

    position:absolute;

    top:20px;

    left:20px;

    display:none;

    padding:12px 25px;

    border-radius:20px;

    background:#111;

    border:1px solid #008cff;

    color:white;

    cursor:pointer;

    z-index:10;

}




#player{

    display:none;

    position:absolute;

    inset:0;

    background:black;

}



video,iframe{

    width:100%;

    height:100%;

    border:0;

}



</style>


</head>


<body>



<button id="back" onclick="home()">

⬅ Retour

</button>




<div id="home">


<div class="logo">

VixCiné

</div>



<div class="subtitle">

Votre cinéma privé immersif

</div>




<div class="buttons" id="buttons">


<button class="bigBtn" onclick="ambiance()">

🎬

<br>

Ambiance salle

</button>



<button class="bigBtn" onclick="youtubeMenu()">

▶

<br>

YouTube

</button>


</div>




<div id="youtubeBox">


<input id="url" placeholder="Colle ton lien YouTube">


<br>


<button class="start" onclick="youtube()">

Lancer la vidéo

</button>


</div>



</div>





<div id="player"></div>





<script>


function fullscreen(el){

    if(el.requestFullscreen){

        el.requestFullscreen();

    }

    else if(el.webkitRequestFullscreen){

        el.webkitRequestFullscreen();

    }

}





function ambiance(){


    let player = document.getElementById("player");


    player.style.display="block";


    document.getElementById("home").style.display="none";


    document.getElementById("back").style.display="block";



    player.innerHTML=`

    <video 
    id="cinemaAmbiance"
    autoplay
    loop
    muted
    playsinline>

        <source src="VixCiné.webm" type="video/webm">

    </video>

    `;



    let video = document.getElementById("cinemaAmbiance");



    video.play();



    // Bloque les actions clavier (pause espace, flèches...)
    video.addEventListener("keydown", function(e){

        e.preventDefault();

    });



    // Empêche clic droit
    video.addEventListener("contextmenu", function(e){

        e.preventDefault();

    });



    // Empêche pause accidentelle
    video.addEventListener("pause", function(){

        video.play();

    });



    // Plein écran réel
    if(video.requestFullscreen){

        video.requestFullscreen();

    }
    else if(video.webkitRequestFullscreen){

        video.webkitRequestFullscreen();

    }


}






function youtubeMenu(){


    document.getElementById("buttons").style.display="none";


    document.getElementById("youtubeBox").style.display="block";


}







function youtube(){


    let url=document.getElementById("url").value;


    let id="";



    if(url.includes("watch?v=")){


        id=url.split("watch?v=")[1].split("&")[0];


    }


    else if(url.includes("youtu.be/")){


        id=url.split("youtu.be/")[1];


    }


    else{


        alert("Lien YouTube invalide");


        return;


    }





    document.getElementById("player").innerHTML=`

    <iframe

    src="https://www.youtube.com/embed/${id}?autoplay=1"

    allow="autoplay; fullscreen"

    allowfullscreen>

    </iframe>

    `;



    document.getElementById("player").style.display="block";


    document.getElementById("home").style.display="none";


    document.getElementById("back").style.display="block";



    fullscreen(document.getElementById("player"));



}







function home(){



    document.getElementById("player").innerHTML="";


    document.getElementById("player").style.display="none";



    document.getElementById("home").style.display="block";


    document.getElementById("back").style.display="none";



    document.getElementById("buttons").style.display="flex";


    document.getElementById("youtubeBox").style.display="none";



    if(document.fullscreenElement){

        document.exitFullscreen();

    }


}



</script>


</body>

</html>
