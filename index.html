<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VixCiné</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background:
    linear-gradient(
        rgba(0,0,0,.75),
        rgba(0,0,0,.95)
    ),
    radial-gradient(circle,#003b70,#000);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    overflow:hidden;
}


body:before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:#008cff;
    filter:blur(180px);
    opacity:.25;
    animation:light 5s infinite alternate;
}


@keyframes light{
from{
    transform:translate(-200px,-100px);
}
to{
    transform:translate(200px,100px);
}
}



#home{
    text-align:center;
    z-index:2;
}


.logo{

    font-size:90px;
    font-weight:900;
    letter-spacing:10px;

    text-shadow:
    0 0 10px #00aaff,
    0 0 40px #008cff,
    0 0 80px #0066ff;
}


.subtitle{
    font-size:22px;
    margin-top:15px;
    color:#aaa;
}



.buttons{

    margin-top:80px;
    display:flex;
    gap:50px;
    justify-content:center;

}


.bigBtn{

    width:350px;
    height:140px;

    border-radius:25px;
    border:2px solid #008cff;

    background:
    linear-gradient(
        135deg,
        rgba(0,130,255,.35),
        rgba(0,0,0,.7)
    );

    color:white;

    font-size:30px;
    font-weight:bold;

    cursor:pointer;
    transition:.4s;

    box-shadow:
    0 0 30px #0077ff;
}


.bigBtn:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 70px #00aaff;

}



#youtubeBox{
    display:none;
}


input{

    width:450px;
    padding:20px;

    border-radius:15px;
    border:none;

    font-size:18px;
    text-align:center;
}



.start{

    margin-top:20px;

    width:250px;
    height:60px;

    border-radius:15px;
    border:none;

    background:#008cff;

    color:white;

    font-size:20px;

}



#back{

    position:fixed;

    top:15px;
    left:15px;

    z-index:9999;

    display:none;

    width:45px;
    height:45px;

    border-radius:50%;

    border:1px solid #008cff;

    background:rgba(0,0,0,.6);

    color:white;

    font-size:22px;

    cursor:pointer;

    display:flex;

    align-items:center;
    justify-content:center;

    transition:.3s;

}


#back:hover{

    transform:scale(1.15);

    box-shadow:
    0 0 25px #008cff;

}




#player{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100vw;
    height:100vh;

    background:black;

    z-index:5;

}



#player video{

    width:100vw;
    height:100vh;

    object-fit:cover;

}



iframe{

    width:100%;
    height:100%;

    border:0;

}



</style>

</head>


<body>


<button id="back" onclick="home()">
⬅ Retour
</button>



<div id="home">


<div class="logo">
VixCiné
</div>


<div class="subtitle">
Votre cinéma privé immersif
</div>


<div class="buttons" id="buttons">


<button class="bigBtn" onclick="ambiance()">

🎬
<br>
Ambiance salle

</button>


<button class="bigBtn" onclick="youtubeMenu()">

▶
<br>
YouTube

</button>


</div>



<div id="youtubeBox">

<input id="url" placeholder="Colle ton lien YouTube">

<br>

<button class="start" onclick="youtube()">
Lancer la vidéo
</button>


</div>


</div>



<div id="player"></div>




<script>


function ambiance(){

let player=document.getElementById("player");


document.getElementById("home").style.display="none";
document.getElementById("back").style.display="block";


player.style.display="block";


player.innerHTML=`

<video 
id="cinemaAmbiance"
autoplay
loop
muted
playsinline
disablePictureInPicture>

<source src="VixCiné.webm" type="video/webm">

</video>

`;


let video=document.getElementById("cinemaAmbiance");


video.play();

}




function youtubeMenu(){

document.getElementById("buttons").style.display="none";

document.getElementById("youtubeBox").style.display="block";

}




function youtube(){

let url=document.getElementById("url").value;

let id="";


if(url.includes("watch?v=")){

id=url.split("watch?v=")[1].split("&")[0];

}

else if(url.includes("youtu.be/")){

id=url.split("youtu.be/")[1];

}

else{

alert("Lien YouTube invalide");
return;

}



document.getElementById("player").innerHTML=`

<iframe

src="https://www.youtube.com/embed/${id}?autoplay=1"

allow="autoplay; fullscreen"

allowfullscreen>

</iframe>

`;


document.getElementById("player").style.display="block";

document.getElementById("home").style.display="none";

document.getElementById("back").style.display="block";

}




function home(){


document.getElementById("player").innerHTML="";

document.getElementById("player").style.display="none";


document.getElementById("home").style.display="block";

document.getElementById("back").style.display="none";


document.getElementById("buttons").style.display="flex";


document.getElementById("youtubeBox").style.display="none";


}


</script>


</body>
</html>
